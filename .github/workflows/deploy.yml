name: Deploy to GitHub Pages

# Builds the site and publishes it to GitHub Pages on every push to main.
# For a PROJECT page (user.github.io/<repo>), SITE_BASE must be "/<repo>/".
# For a custom domain, set SITE_BASE to "/".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true # create/enable the Pages site (build type: GitHub Actions)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build
        # Derives base "/<repo>/" and origin "https://<owner>.github.io" (owner
        # lowercased to match the Pages host) from the repository.
        # (For a custom domain, set SITE_BASE="/" and SITE_URL="https://clemensschulz.com".)
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY%/*}" | tr '[:upper:]' '[:lower:]')
          SITE_BASE="/${GITHUB_REPOSITORY#*/}/" \
          SITE_URL="https://${OWNER_LC}.github.io" \
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
